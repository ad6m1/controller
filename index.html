<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>لوحة التحكم - AI Creator Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #00f5ff;
      --secondary: #7b2ff7;
      --accent: #ff006e;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --dark: #0a0e27;
      --darker: #050816;
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.6);
      --glow: rgba(0, 245, 255, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Tajawal", system-ui;
      background: var(--darker);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    .tech-bg {
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(123, 47, 247, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 0, 110, 0.1) 0%, transparent 50%);
      z-index: 0;
    }

    .grid-lines {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(10, 14, 39, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 245, 255, 0.1);
      border-radius: 30px;
      padding: 50px 40px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      max-width: 600px;
      width: 100%;
    }

    .card-content {
      position: relative;
      z-index: 1;
    }

    .ai-logo {
      text-align: center;
      margin-bottom: 40px;
    }

    .ai-icon-wrapper {
      width: 100px;
      height: 100px;
      margin: 0 auto 25px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ai-icon-inner {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 35px;
      color: white;
      box-shadow: 
        0 0 30px var(--glow),
        inset 0 2px 0 rgba(255, 255, 255, 0.3);
    }

    .ai-logo h1 {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .ai-logo p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .info-alert {
      background: rgba(0, 245, 255, 0.1);
      border: 1px solid rgba(0, 245, 255, 0.3);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 25px;
      text-align: center;
      font-size: 13px;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      pointer-events: none;
    }

    .eye-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 10px;
      margin: -10px;
      z-index: 10;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 16px 55px;
      border-radius: 15px;
      border: 1px solid rgba(0, 245, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font-family: inherit;
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
    }

    input[type="password"] {
      padding-left: 55px;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 15px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      -webkit-appearance: none;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
    }

    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #dc2626);
      margin-top: 20px;
    }

    .status {
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }

    .status.error {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
      display: block;
    }

    .status.success {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      border: 1px solid rgba(16, 185, 129, 0.3);
      display: block;
    }

    .dashboard-content {
      text-align: center;
    }

    .welcome-msg {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 28px;
      font-weight: 800;
      margin: 20px 0;
    }

    .info-card {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 245, 255, 0.2);
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      text-align: right;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0, 245, 255, 0.1);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: var(--text-muted);
      font-size: 14px;
    }

    .info-value {
      color: var(--text);
      font-weight: 600;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .card {
        padding: 35px 25px;
      }
    }
  </style>
</head>
<body>
  <div class="tech-bg"></div>
  <div class="grid-lines"></div>

  <div class="container">
    <!-- LOGIN PAGE -->
    <div class="card" id="loginPage">
      <div class="card-content">
        <div class="ai-logo">
          <div class="ai-icon-wrapper">
            <div class="ai-icon-inner">
              <i class="fas fa-user-shield"></i>
            </div>
          </div>
          <h1>لوحة التحكم</h1>
          <p>نظام إدارة المستخدمين والصلاحيات</p>
        </div>

        <div class="info-alert">
          <i class="fas fa-crown"></i>
          دخول خاص بالمالك والإدارة فقط
        </div>

        <div class="info-alert" style="background: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.3); color: var(--warning);">
          <i class="fas fa-exclamation-triangle"></i>
          استخدم الملف المحلي للوصول الكامل لإدارة المستخدمين
        </div>

        <div>
          <div class="form-group">
            <label>
              <i class="fas fa-envelope"></i>
              البريد الإلكتروني
            </label>
            <div class="input-wrapper">
              <input 
                type="email" 
                id="emailInput" 
                placeholder="controller@ahmedmarketing.cloud"
                autocomplete="email">
              <i class="fas fa-user input-icon"></i>
            </div>
          </div>

          <div class="form-group">
            <label>
              <i class="fas fa-key"></i>
              الرمز السري
            </label>
            <div class="input-wrapper">
              <input 
                type="password" 
                id="codeInput" 
                placeholder="أدخل الرمز السري"
                autocomplete="current-password">
              <i class="fas fa-lock input-icon"></i>
              <i class="fas fa-eye eye-icon" id="togglePassword"></i>
            </div>
          </div>

          <button type="button" class="btn btn-primary" onclick="handleLogin()">
            <span>
              <i class="fas fa-sign-in-alt"></i>
              <span id="btnText">تسجيل الدخول</span>
            </span>
          </button>

          <div class="status" id="statusDiv"></div>
        </div>
      </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div class="card hidden" id="dashboardPage">
      <div class="card-content">
        <div class="dashboard-content">
          <div class="ai-icon-wrapper" style="margin: 0 auto 20px;">
            <div class="ai-icon-inner">
              <i class="fas fa-check-circle"></i>
            </div>
          </div>
          
          <h1 class="welcome-msg" id="welcomeMsg">مرحباً!</h1>
          
          <div class="info-card">
            <div class="info-row">
              <span class="info-label">البريد الإلكتروني</span>
              <span class="info-value" id="userEmail">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">الاسم</span>
              <span class="info-value" id="userName">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">الدور</span>
              <span class="info-value" id="userRole">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">الحالة</span>
              <span class="info-value" id="userStatus">-</span>
            </div>
            <div class="info-row">
              <span class="info-label">الوصول</span>
              <span class="info-value" id="userAccess">-</span>
            </div>
          </div>

          <div class="info-alert" style="background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); color: var(--success);">
            <i class="fas fa-info-circle"></i>
            تم تسجيل الدخول بنجاح! للوصول الكامل لإدارة المستخدمين، استخدم الملف المحلي على جهازك.
          </div>

          <button class="btn btn-danger" onclick="logout()">
            <span>
              <i class="fas fa-sign-out-alt"></i>
              تسجيل الخروج
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    console.log('🚀 Admin Dashboard Lite');

    async function sha256(message) {
      try {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        return hashHex;
      } catch (error) {
        console.error('SHA-256 error:', error);
        throw error;
      }
    }

    const USERS_DB_KEY = 'aiCreatorUsers_v2';

    function getUsers() {
      try {
        const users = localStorage.getItem(USERS_DB_KEY);
        if (!users) {
          const defaultUsers = {
            "controller@ahmedmarketing.cloud": {
              name: "المالك الرئيسي",
              codeHash: "9bfdca9597bac776ccdd7ce3b569469ad4ae3ac72a3948e1ebb6738aad736359",
              role: "admin",
              status: "active",
              tempAccess: null,
              createdAt: new Date().toISOString()
            },
            "ali@ahmedmarketing.cloud": {
              name: "علي محمد",
              codeHash: "d5083e34522626dd10e151c78c1ba502a3d67427b752c3fd43bd3b944072d1e7",
              role: "user",
              status: "active",
              tempAccess: null,
              createdAt: new Date().toISOString()
            },
            "sjaad@ahmedmarketing.cloud": {
              name: "سجاد",
              codeHash: "d5a65b667f26c7f176a211510a8f6ba639c371b7979ea258d289fd1604ae6c28",
              role: "user",
              status: "active",
              tempAccess: null,
              createdAt: new Date().toISOString()
            },
            "admin@ahmedmarketing.cloud": {
              name: "mkd",
              codeHash: "21817c78a3ba029c98dfa049d5edc500cda26d00d3a2c6b47cc6e7062a689ef0",
              role: "user",
              status: "active",
              tempAccess: null,
              createdAt: new Date().toISOString()
            }
          };
          localStorage.setItem(USERS_DB_KEY, JSON.stringify(defaultUsers));
          console.log('✅ Default users created');
          return defaultUsers;
        }
        console.log('✅ Users loaded');
        return JSON.parse(users);
      } catch (error) {
        console.error('localStorage error:', error);
        return {};
      }
    }

    function checkTempAccess(user) {
      if (!user.tempAccess) {
        return { valid: true, expired: false };
      }
      
      const expiryDate = new Date(user.tempAccess.expiryDate);
      const now = new Date();
      
      if (now > expiryDate) {
        return { 
          valid: false, 
          expired: true,
          expiryDate: user.tempAccess.expiryDate,
          daysGranted: user.tempAccess.days
        };
      }
      
      const daysRemaining = Math.ceil((expiryDate - now) / (1000 * 60 * 60 * 24));
      
      return { 
        valid: true, 
        expired: false,
        expiryDate: user.tempAccess.expiryDate,
        daysGranted: user.tempAccess.days,
        daysRemaining: daysRemaining
      };
    }

    // Toggle Password
    const togglePassword = document.getElementById('togglePassword');
    const codeInput = document.getElementById('codeInput');
    
    if (togglePassword && codeInput) {
      togglePassword.addEventListener('click', function(e) {
        e.preventDefault();
        const type = codeInput.getAttribute('type') === 'password' ? 'text' : 'password';
        codeInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
      });
    }

    // Login Function
    async function handleLogin() {
      const loginBtn = event.target;
      const btnText = document.getElementById('btnText');
      const statusDiv = document.getElementById('statusDiv');
      
      loginBtn.disabled = true;
      btnText.textContent = 'جار التحقق...';
      statusDiv.style.display = 'none';
      
      const email = document.getElementById('emailInput').value.trim().toLowerCase();
      const code = document.getElementById('codeInput').value.trim();

      console.log('🔐 Login attempt:', email);

      try {
        const users = getUsers();

        if (!users[email]) {
          throw new Error('بيانات الدخول غير صحيحة');
        }

        const enteredCodeHash = await sha256(code);
        
        if (users[email].codeHash !== enteredCodeHash) {
          throw new Error('بيانات الدخول غير صحيحة');
        }

        if (users[email].role !== 'admin') {
          throw new Error('هذه اللوحة مخصصة للمالك فقط');
        }

        if (users[email].status === 'disabled') {
          throw new Error('هذا الحساب معطل');
        }

        const tempAccessInfo = checkTempAccess(users[email]);
        if (!tempAccessInfo.valid && tempAccessInfo.expired) {
          throw new Error('انتهت صلاحية حسابك');
        }

        // Success - Show Dashboard
        console.log('✅ Login successful');
        
        document.getElementById('loginPage').classList.add('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');
        
        document.getElementById('welcomeMsg').textContent = `مرحباً ${users[email].name}!`;
        document.getElementById('userEmail').textContent = email;
        document.getElementById('userName').textContent = users[email].name;
        document.getElementById('userRole').textContent = users[email].role === 'admin' ? 'مدير' : 'مستخدم';
        document.getElementById('userStatus').textContent = users[email].status === 'active' ? 'نشط' : 'معطل';
        
        if (users[email].tempAccess) {
          if (tempAccessInfo.valid) {
            document.getElementById('userAccess').textContent = `مؤقت (${tempAccessInfo.daysRemaining} يوم متبقي)`;
          } else {
            document.getElementById('userAccess').textContent = 'منتهي';
          }
        } else {
          document.getElementById('userAccess').textContent = 'دائم';
        }

      } catch (error) {
        console.error('❌ Login error:', error);
        statusDiv.className = 'status error';
        statusDiv.textContent = '❌ ' + error.message;
        btnText.textContent = 'تسجيل الدخول';
        loginBtn.disabled = false;
      }
    }

    function logout() {
      document.getElementById('dashboardPage').classList.add('hidden');
      document.getElementById('loginPage').classList.remove('hidden');
      document.getElementById('emailInput').value = '';
      document.getElementById('codeInput').value = '';
      console.log('✅ Logged out');
    }

    // Enter key
    document.getElementById('codeInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleLogin();
      }
    });

    // Initialize
    window.addEventListener('load', function() {
      getUsers();
    });
  </script>
</body>
</html>
